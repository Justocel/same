# Use the project's own ruff (from pyproject's dev group) so the hook and
# `make lint`/`make format` can never drift to different versions.
repos:
  - repo: local
    hooks:
      - id: ruff
        name: ruff (lint)
        entry: uv run ruff check --fix
        language: system
        types: [python]
        require_serial: true
      - id: ruff-format
        name: ruff (format)
        entry: uv run ruff format
        language: system
        types: [python]
        require_serial: true
